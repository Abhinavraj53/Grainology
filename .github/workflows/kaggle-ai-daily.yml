name: Publish Kaggle AI Output

on:
  workflow_dispatch:
  # Local-first for now: keep automatic publishing disabled until the model is ready.
  # Later, enable a morning schedule such as:
  # schedule:
  #   - cron: '30 2 * * *' # 08:00 IST

concurrency:
  group: grainology-kaggle-ai-production
  cancel-in-progress: false

jobs:
  publish-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publisher dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kaggle==2.2.3 supabase==2.31.0 jsonschema==4.25.1

      - name: Download latest Kaggle output
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          KERNEL_ID="${{ secrets.KAGGLE_KERNEL_ID }}"
          mkdir -p staging kaggle-output
          kaggle kernels output "$KERNEL_ID" -p kaggle-output
          if [ -d kaggle-output/release ]; then
            cp -R kaggle-output/release/. staging/
          else
            find kaggle-output -type f \( -name '*.json' -o -name '*.parquet' -o -name '*.csv' \) -exec cp {} staging/ \;
          fi

      - name: Validate prediction bundle
        run: python automation/validate_prediction_bundle.py staging

      - name: Publish prediction release
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_PREDICTION_BUCKET: ${{ secrets.AI_PREDICTION_BUCKET }}
          KAGGLE_KERNEL_ID: ${{ secrets.KAGGLE_KERNEL_ID }}
        run: python automation/publish_kaggle_release.py --bundle-dir staging
