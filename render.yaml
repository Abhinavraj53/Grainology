# Render Blueprint - Backend + Frontend
# Deploy both from Render Dashboard → New → Blueprint → Connect repo and select this file

services:
  # Backend API (Node)
  - type: web
    name: grainology-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://grainologyagri.com
      - key: CORS_ORIGINS
        value: https://grainologyagri.com,https://www.grainologyagri.com
      - key: AI_PREDICTIONS_SOURCE
        value: supabase_release
      - key: AI_PREDICTION_BUCKET
        value: ai-predictions
      - key: AI_RELEASE_CACHE_TTL_SECONDS
        value: "300"
      - key: GEMINI_ENABLE_GOOGLE_SEARCH
        value: "true"
      # Set secrets in Render Dashboard: MONGODB_URI, JWT_SECRET, SUPABASE_URL,
      # SUPABASE_SECRET_KEY/SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY, BREVO keys, etc.

  # Frontend (static site from Vite build)
  - type: web
    name: grainology-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://grainology-xcg8.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # After first deploy, set FRONTEND_URL on the backend service to this frontend URL (e.g. https://grainology-frontend.onrender.com)
